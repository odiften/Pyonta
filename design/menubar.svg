<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
  <!-- Pyonta menu bar icon: stylized rabbit head silhouette, template image (single color) -->
  <!-- Rendered as black; macOS recolors automatically based on menu bar appearance -->
  <g fill="black">
    <!-- Head (slightly oval, positioned to touch ear bases) -->
    <ellipse cx="11" cy="14" rx="5.6" ry="5.0"/>
    <!-- Left ear (overlaps head base) -->
    <path d="M 7.8 3.0
             C 6.4 3.0, 5.6 5.2, 6.0 8.4
             C 6.2 10.6, 7.0 12.4, 8.4 12.8
             C 9.4 12.2, 9.7 10.4, 9.55 8.4
             C 9.4 5.4, 9.0 3.0, 7.8 3.0 Z"/>
    <!-- Right ear (overlaps head base) -->
    <path d="M 14.2 3.0
             C 15.6 3.0, 16.4 5.2, 16.0 8.4
             C 15.8 10.6, 15.0 12.4, 13.6 12.8
             C 12.6 12.2, 12.3 10.4, 12.45 8.4
             C 12.6 5.4, 13.0 3.0, 14.2 3.0 Z"/>
  </g>
</svg>
